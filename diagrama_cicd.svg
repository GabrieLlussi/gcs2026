<svg viewBox="0 0 1000 740" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>

    <!-- Ícone GitHub (simplificado) -->
    <g id="icon-github">
      <circle cx="0" cy="0" r="14" fill="#1f2937"/>
      <path d="M0,-8 C-4.5,-8 -8,-4.5 -8,0 C-8,3.5 -5.8,6.4 -2.8,7.4 C-2.4,7.5 -2.2,7.2 -2.2,7 C-2.2,6.8 -2.2,6.2 -2.2,5.4 C-4.3,5.9 -4.7,4.4 -4.7,4.4 C-5,3.6 -5.5,3.4 -5.5,3.4 C-6.2,2.9 -5.6,2.9 -5.6,2.9 C-4.9,3 -4.5,3.6 -4.5,3.6 C-3.9,4.7 -2.8,4.4 -2.4,4.2 C-2.3,3.7 -2.1,3.4 -1.9,3.2 C-3.6,3 -5.3,2.3 -5.3,-0.5 C-5.3,-1.4 -5,-2.1 -4.5,-2.6 C-4.6,-2.9 -4.9,-3.7 -4.4,-4.9 C-4.4,-4.9 -3.7,-5.1 -2.2,-4.1 C-1.5,-4.3 -0.7,-4.4 0,-4.4 C0.7,-4.4 1.5,-4.3 2.2,-4.1 C3.7,-5.1 4.4,-4.9 4.4,-4.9 C4.9,-3.7 4.6,-2.9 4.5,-2.6 C5,-2.1 5.3,-1.4 5.3,-0.5 C5.3,2.3 3.6,3 1.9,3.2 C2.2,3.5 2.4,4 2.4,4.8 C2.4,5.9 2.4,6.7 2.4,7 C2.4,7.2 2.6,7.5 3,7.4 C6,6.4 8.2,3.5 8.2,0 C8.2,-4.5 4.5,-8 0,-8 Z" fill="#ffffff"/>
    </g>

    <!-- Ícone Ubuntu -->
    <g id="icon-ubuntu">
      <circle cx="0" cy="0" r="14" fill="#E95420"/>
      <circle cx="0" cy="-7" r="2.6" fill="#ffffff"/>
      <circle cx="-6.5" cy="4.5" r="2.6" fill="#ffffff"/>
      <circle cx="6.5" cy="4.5" r="2.6" fill="#ffffff"/>
      <circle cx="0" cy="0" r="3.4" fill="none" stroke="#ffffff" stroke-width="1.3"/>
    </g>

    <!-- Ícone Docker -->
    <g id="icon-docker">
      <rect x="-15" y="-12" width="30" height="24" rx="5" fill="#2496ED"/>
      <rect x="-9" y="-4" width="5" height="5" fill="#ffffff"/>
      <rect x="-2" y="-4" width="5" height="5" fill="#ffffff"/>
      <rect x="5" y="-4" width="5" height="5" fill="#ffffff"/>
      <rect x="-2" y="-10" width="5" height="5" fill="#ffffff"/>
      <rect x="5" y="-10" width="5" height="5" fill="#ffffff"/>
      <path d="M-12,3 C-12,7 -8,9 -2,9 C5,9 11,6 13,2 C9,1 -8,1 -12,3 Z" fill="#ffffff"/>
    </g>

    <!-- Ícone Jenkins estilizado (inspirado no mordomo, NÃO é a logo oficial) -->
    <g id="icon-jenkins">
      <circle cx="0" cy="0" r="15" fill="#D33833"/>
      <!-- rosto -->
      <ellipse cx="0" cy="0" rx="9" ry="8.5" fill="#f1ede1"/>
      <!-- tufo de cabelo característico -->
      <path d="M-4,-7 C-3,-11 1,-11 2,-7" stroke="#5b3a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- sobrancelhas arqueadas -->
      <path d="M-5,-2.5 C-4,-4.5 -1.5,-4.5 -0.8,-2.8" stroke="#222" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M0.8,-2.8 C1.5,-4.5 4,-4.5 5,-2.5" stroke="#222" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <!-- olhos -->
      <circle cx="-2.6" cy="-1" r="0.9" fill="#222"/>
      <circle cx="2.6" cy="-1" r="0.9" fill="#222"/>
      <!-- nariz/queixo sorridente -->
      <path d="M-3,2 C-1,4.5 1,4.5 3,2" stroke="#222" stroke-width="1.1" fill="none" stroke-linecap="round"/>
      <!-- gravata borboleta -->
      <path d="M-3,8 L0,6 L3,8 L0,10 Z" fill="#222"/>
    </g>

    <!-- Ícone PHP -->
    <g id="icon-php">
      <ellipse cx="0" cy="0" rx="16" ry="10" fill="#777BB3"/>
      <text x="0" y="4" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#ffffff">php</text>
    </g>

    <!-- Ícone PostgreSQL estilizado (inspirado no elefante, NÃO é a logo oficial) -->
    <g id="icon-postgres">
      <circle cx="0" cy="0" r="15" fill="#336791"/>
      <!-- orelhas -->
      <ellipse cx="-7.5" cy="-2" rx="3.4" ry="4.2" fill="#ffffff"/>
      <ellipse cx="7.5" cy="-2" rx="3.4" ry="4.2" fill="#ffffff"/>
      <!-- cabeça -->
      <ellipse cx="0" cy="-1" rx="7.5" ry="6.5" fill="#ffffff"/>
      <!-- olhos -->
      <circle cx="-2.6" cy="-2.5" r="1" fill="#336791"/>
      <circle cx="2.6" cy="-2.5" r="1" fill="#336791"/>
      <!-- tromba curvada -->
      <path d="M-1.5,3 C-2,7 1,9 3.5,7" stroke="#ffffff" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <!-- presas -->
      <path d="M-3,4.5 C-3.6,6.5 -3,7.5 -1.8,7.8" stroke="#ffffff" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Ícone teste (check) -->
    <g id="icon-check">
      <circle cx="0" cy="0" r="12" fill="#16a34a"/>
      <path d="M-5,0 L-1.5,4 L5,-4" stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Ícone lupa -->
    <g id="icon-search">
      <circle cx="0" cy="0" r="12" fill="#6b7280"/>
      <circle cx="-1.5" cy="-1.5" r="5" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="2.5" y1="2.5" x2="6" y2="6" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    </g>
  </defs>

  <rect width="1000" height="740" fill="#ffffff"/>

  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#111827">Arquitetura CI/CD - Pipeline Laravel/PostgreSQL</text>

  <!-- GitHub box -->
  <rect x="370" y="58" width="260" height="72" rx="10" fill="#1f2937"/>
  <use href="#icon-github" x="395" y="94"/>
  <text x="500" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">GitHub</text>
  <text x="500" y="106" text-anchor="middle" font-size="12" fill="#d1d5db">Versionamento (Git) e</text>
  <text x="500" y="120" text-anchor="middle" font-size="12" fill="#d1d5db">Controle de Mudança (PR/Issues)</text>

  <!-- arrow github -> VM -->
  <line x1="500" y1="130" x2="500" y2="168" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="515" y="153" font-size="11" fill="#374151">webhook / push</text>

  <!-- VM outer box -->
  <rect x="60" y="173" width="880" height="540" rx="14" fill="#eef2f7" stroke="#9ca3af" stroke-width="2"/>
  <use href="#icon-ubuntu" x="100" y="200"/>
  <text x="125" y="205" font-size="15" font-weight="bold" fill="#111827">Máquina Virtual — Ubuntu Server (SO)</text>

  <!-- Docker engine box -->
  <rect x="80" y="222" width="840" height="473" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <use href="#icon-docker" x="105" y="248"/>
  <text x="130" y="252" font-size="14" font-weight="bold" fill="#312e81">Docker Engine — 3 Containers</text>

  <!-- Container 1: Jenkins (sem detalhamento interno) -->
  <rect x="110" y="272" width="250" height="400" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="235" y="304" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Container 1: Jenkins</text>
  <text x="235" y="320" text-anchor="middle" font-size="11" fill="#6b7280">(Ubuntu Server base image)</text>

  <g transform="translate(235,470) scale(3.2)">
    <use href="#icon-jenkins"/>
  </g>

  <!-- arrow jenkins -> homolog -->
  <line x1="360" y1="380" x2="430" y2="380" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="395" y="370" text-anchor="middle" font-size="10" fill="#374151">deploy</text>

  <!-- arrow jenkins -> prod -->
  <line x1="360" y1="580" x2="430" y2="580" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="368" y="570" font-size="10" fill="#374151">deploy (aprovação)</text>

  <!-- Container 2: Homologação -->
  <rect x="430" y="272" width="240" height="180" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="550" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">Container 2: Homologação</text>
  <text x="550" y="316" text-anchor="middle" font-size="11" fill="#6b7280">(Ubuntu Server base image)</text>

  <rect x="450" y="332" width="200" height="34" rx="6" fill="#dbeafe"/>
  <use href="#icon-php" x="468" y="349"/>
  <text x="565" y="353" text-anchor="middle" font-size="12" fill="#1e3a8a">PHP 8 + Laravel</text>

  <rect x="450" y="374" width="200" height="34" rx="6" fill="#dbeafe"/>
  <use href="#icon-postgres" x="468" y="391"/>
  <text x="565" y="395" text-anchor="middle" font-size="12" fill="#1e3a8a">PostgreSQL</text>

  <!-- Container 3: Produção -->
  <rect x="430" y="490" width="240" height="180" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="550" y="518" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">Container 3: Produção</text>
  <text x="550" y="534" text-anchor="middle" font-size="11" fill="#6b7280">(Ubuntu Server base image)</text>

  <rect x="450" y="550" width="200" height="34" rx="6" fill="#d1fae5"/>
  <use href="#icon-php" x="468" y="567"/>
  <text x="565" y="571" text-anchor="middle" font-size="12" fill="#065f46">PHP 8 + Laravel</text>

  <rect x="450" y="592" width="200" height="34" rx="6" fill="#d1fae5"/>
  <use href="#icon-postgres" x="468" y="609"/>
  <text x="565" y="613" text-anchor="middle" font-size="12" fill="#065f46">PostgreSQL</text>

  <!-- Legend box: ferramentas gerais -->
  <rect x="700" y="272" width="200" height="400" rx="12" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
  <text x="800" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">Resumo de Tecnologias</text>

  <use href="#icon-docker" x="722" y="330" />
  <text x="745" y="325" font-size="11.5" font-weight="bold" fill="#111827">Ambiente</text>
  <text x="745" y="340" font-size="11" fill="#374151">VM + Docker + Ubuntu Server</text>

  <use href="#icon-php" x="722" y="372"/>
  <text x="745" y="367" font-size="11.5" font-weight="bold" fill="#111827">Linguagem / BD</text>
  <text x="745" y="382" font-size="11" fill="#374151">PHP (Laravel) / PostgreSQL</text>

  <use href="#icon-github" x="722" y="414"/>
  <text x="745" y="409" font-size="11.5" font-weight="bold" fill="#111827">Controle de Mudança</text>
  <text x="745" y="424" font-size="11" fill="#374151">GitHub (Pull Requests/Issues)</text>

  <use href="#icon-github" x="722" y="456"/>
  <text x="745" y="451" font-size="11.5" font-weight="bold" fill="#111827">Versionamento</text>
  <text x="745" y="466" font-size="11" fill="#374151">Git + GitHub</text>

  <use href="#icon-jenkins" x="722" y="498"/>
  <text x="745" y="493" font-size="11.5" font-weight="bold" fill="#111827">Integração</text>
  <text x="745" y="508" font-size="11" fill="#374151">Jenkins (CI/CD)</text>

  <use href="#icon-check" x="722" y="538"/>
  <text x="745" y="533" font-size="11.5" font-weight="bold" fill="#111827">Testes</text>
  <text x="745" y="548" font-size="11" fill="#374151">PHPUnit (unitários)</text>
  <text x="745" y="562" font-size="11" fill="#374151">PHPMD (qualidade)</text>

  <use href="#icon-docker" x="722" y="600"/>
  <text x="745" y="595" font-size="11.5" font-weight="bold" fill="#111827">Containerização</text>
  <text x="745" y="610" font-size="11" fill="#374151">Docker</text>

  <use href="#icon-ubuntu" x="722" y="642"/>
  <text x="745" y="637" font-size="11.5" font-weight="bold" fill="#111827">Sistema Operacional</text>
  <text x="745" y="652" font-size="11" fill="#374151">Ubuntu Server</text>
</svg>
