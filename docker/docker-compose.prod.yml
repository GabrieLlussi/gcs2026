version: '3.8'

services:
  app:
    build: ..
    container_name: laravel_prod
    ports:
      - "8082:8000"
    env_file:
      - ../.env.prod
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_prod
    restart: always
    environment:  
      POSTGRES_DB: prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

volumes:
  postgres_data_prod: