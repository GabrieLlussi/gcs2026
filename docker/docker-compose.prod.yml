name: prod

services:
  app:
    build: .
    container_name: app_prod
    ports:
      - "8082:8000"
    depends_on:
      - db
    env_file:
      - .env.prod

  db:
    image: postgres:15
    container_name: postgres_prod
    environment:
      POSTGRES_DB: gcs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

volumes:
  postgres_prod_data: