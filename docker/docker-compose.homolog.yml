version: '3.8'

services:
  app:
    build: ..
    container_name: laravel_homolog
    ports:
      - "8081:8000"
    env_file:
      - ../.env.homolog
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_homolog
    restart: always
    environment:
      POSTGRES_DB: homolog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data_homolog:/var/lib/postgresql/data

volumes:
  postgres_data_homolog: