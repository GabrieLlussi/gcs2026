name: homolog

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: app_homolog
    ports:
      - "8081:8000"
    depends_on:
      - db
    env_file:
      - .env.homolog
    command: sh -c "
      cp /app/docker/.env.homolog /app/.env &&
      echo 'Esperando banco subir...' &&
      sleep 10 &&
      php artisan key:generate --force &&
      until php artisan migrate --force; do
        sleep 3
      done &&
      php artisan db:seed --force &&
      php artisan serve --host=0.0.0.0 --port=8000 "
    
  db:
    image: postgres:15
    container_name: postgres_homolog
    environment:
      POSTGRES_DB: gcs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_homolog_data:/var/lib/postgresql/data

volumes:
  postgres_homolog_data:
    name: postgres_homolog_data